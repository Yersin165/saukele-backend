<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password — Saukele</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="auth-wrapper">
    <div class="auth-card">
      <div class="logo"><h1>💍 Saukele</h1></div>
      <h2>New Password</h2>
      <div class="alert alert-error" id="err"></div>
      <div class="alert alert-success" id="msg"></div>
      <div class="form-group">
        <label>New Password</label>
        <input type="password" id="password" placeholder="Min 8 characters">
      </div>
      <div class="form-group">
        <label>Confirm Password</label>
        <input type="password" id="confirm" placeholder="Repeat password">
      </div>
      <button class="btn btn-primary btn-block" onclick="doReset()">
        <span id="btn-text">Reset Password</span>
      </button>
    </div>
  </div>
  <script>
    const API = '/api';
    const token = new URLSearchParams(window.location.search).get('token');
    if (!token) { document.getElementById('err').textContent = 'Invalid reset link'; document.getElementById('err').classList.add('show'); }

    async function doReset() {
      const password = document.getElementById('password').value;
      const confirm = document.getElementById('confirm').value;
      const btn = document.getElementById('btn-text');
      const err = document.getElementById('err');
      const msg = document.getElementById('msg');
      err.className = 'alert alert-error'; msg.className = 'alert alert-success';

      if (!password || !confirm) { err.textContent = 'Please fill in all fields'; err.classList.add('show'); return; }
      if (password.length < 8) { err.textContent = 'Password must be at least 8 characters'; err.classList.add('show'); return; }
      if (password !== confirm) { err.textContent = 'Passwords do not match'; err.classList.add('show'); return; }

      btn.innerHTML = '<span class="spinner"></span>';
      try {
        const res = await fetch(`${API}/auth/reset-password`, {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token, newPassword: password })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error?.message || 'Reset failed');
        msg.textContent = '✅ Password reset! Redirecting to login...';
        msg.classList.add('show');
        setTimeout(() => location.href = '/pages/login.html', 2000);
      } catch (e) {
        err.textContent = e.message; err.classList.add('show');
      } finally { btn.textContent = 'Reset Password'; }
    }
  </script>
</body>
</html>
