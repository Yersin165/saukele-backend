<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register — Saukele</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="auth-wrapper">
    <div class="auth-card">
      <div class="logo"><h1>💍 Saukele</h1><p>Wedding Gift Registry</p></div>
      <h2>Create account</h2>
      <div class="alert alert-error" id="err"></div>
      <div class="alert alert-success" id="msg"></div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="email" placeholder="you@example.com">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="Min 8 characters">
      </div>
      <div class="form-group">
        <label>I am a...</label>
        <select id="role">
          <option value="COUPLE">Couple (creating a registry)</option>
          <option value="GUEST">Guest (giving gifts)</option>
          <option value="VENDOR">Vendor (selling gifts)</option>
          <option value="COURIER">Courier (delivering gifts)</option>
        </select>
      </div>
      <button class="btn btn-primary btn-block" onclick="doRegister()">
        <span id="btn-text">Create Account</span>
      </button>
      <div class="footer-link">Already have an account? <a href="/pages/login.html">Sign in</a></div>
    </div>
  </div>
  <script>
    const API = '/api';

    async function doRegister() {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const role = document.getElementById('role').value;
      const btn = document.getElementById('btn-text');
      const err = document.getElementById('err');
      const msg = document.getElementById('msg');
      err.className = 'alert alert-error'; msg.className = 'alert alert-success';

      if (!email || !password) { err.textContent = 'Please fill in all fields'; err.classList.add('show'); return; }
      if (password.length < 8) { err.textContent = 'Password must be at least 8 characters'; err.classList.add('show'); return; }

      btn.innerHTML = '<span class="spinner"></span>';
      try {
        const res = await fetch(`${API}/auth/register`, {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password, role })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error?.message || 'Registration failed');
        msg.textContent = '✅ Account created! Please check your email to verify your account.';
        msg.classList.add('show');
        document.getElementById('email').value = '';
        document.getElementById('password').value = '';
        setTimeout(() => location.href = '/pages/login.html', 3000);
      } catch (e) {
        err.textContent = e.message; err.classList.add('show');
      } finally { btn.textContent = 'Create Account'; }
    }

    document.addEventListener('keydown', e => { if (e.key === 'Enter') doRegister(); });
  </script>
</body>
</html>
