<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Saukele</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="auth-wrapper">
    <div class="auth-card">
      <div class="logo"><h1>💍 Saukele</h1><p>Wedding Gift Registry</p></div>
      <h2>Welcome back</h2>
      <div class="alert alert-error" id="err"></div>
      <div class="alert alert-success" id="msg"></div>
      <div class="form-group"><label>Email</label><input type="email" id="email" placeholder="you@example.com"></div>
      <div class="form-group"><label>Password</label><input type="password" id="password" placeholder="••••••••"></div>
      <button class="btn btn-primary btn-block" onclick="doLogin()"><span id="btn-text">Sign In</span></button>
      <div class="footer-link"><a href="/pages/forgot-password.html">Forgot password?</a></div>
      <div class="footer-link">No account? <a href="/pages/register.html">Register</a></div>
    </div>
  </div>
  <script src="/js/auth.js"></script>
  <script>
    if (localStorage.getItem('accessToken')) {
      const u = JSON.parse(localStorage.getItem('user') || 'null');
      if (u) redirectToHome(u.role);
    }

    async function doLogin() {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const btn = document.getElementById('btn-text');
      const err = document.getElementById('err');
      const msg = document.getElementById('msg');
      err.className = 'alert alert-error';
      msg.className = 'alert alert-success';
      if (!email || !password) { err.textContent = 'Please fill in all fields'; err.classList.add('show'); return; }
      btn.innerHTML = '<span class="spinner"></span>';
      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error?.message || 'Login failed');
        localStorage.setItem('accessToken', data.accessToken);
        localStorage.setItem('refreshToken', data.refreshToken);
        localStorage.setItem('user', JSON.stringify(data.user));
        redirectToHome(data.user.role);
      } catch (e) {
        err.textContent = e.message; err.classList.add('show');
      } finally { btn.textContent = 'Sign In'; }
    }
    document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
  </script>
</body>
</html>
