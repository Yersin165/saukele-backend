<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password — Saukele</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="auth-wrapper">
    <div class="auth-card">
      <div class="logo"><h1>💍 Saukele</h1></div>
      <h2>Reset Password</h2>
      <p style="color:#64748b;margin-bottom:1.5rem;text-align:center;font-size:0.9rem">Enter your email and we'll send a reset link</p>
      <div class="alert alert-error" id="err"></div>
      <div class="alert alert-success" id="msg"></div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="email" placeholder="you@example.com">
      </div>
      <button class="btn btn-primary btn-block" onclick="doForgot()">
        <span id="btn-text">Send Reset Link</span>
      </button>
      <div class="footer-link"><a href="/pages/login.html">← Back to login</a></div>
    </div>
  </div>
  <script>
    const API = '/api';

    async function doForgot() {
      const email = document.getElementById('email').value.trim();
      const btn = document.getElementById('btn-text');
      const err = document.getElementById('err');
      const msg = document.getElementById('msg');
      err.className = 'alert alert-error'; msg.className = 'alert alert-success';

      if (!email) { err.textContent = 'Please enter your email'; err.classList.add('show'); return; }

      btn.innerHTML = '<span class="spinner"></span>';
      try {
        const res = await fetch(`${API}/auth/forgot-password`, {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error?.message || 'Request failed');
        msg.textContent = '📧 ' + (data.message || 'Reset link sent! Check your inbox.');
        msg.classList.add('show');
      } catch (e) {
        err.textContent = e.message; err.classList.add('show');
      } finally { btn.textContent = 'Send Reset Link'; }
    }
  </script>
</body>
</html>
